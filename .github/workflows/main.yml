name: wordle workflow
on: 
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main
jobs:
  build:
    name: Worlde action
    runs-on: ubuntu-latest
    steps:
      - name: checkout repository
        uses: actions/checkout@v6

      - name: Setup Node environment
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test
          
